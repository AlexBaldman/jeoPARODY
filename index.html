<!DOCTYPE html>
<html lang="en">
<head>
    <!-- viewport settings for better mobile responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">    
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta charset="UTF-8">
    
    <!-- Preload fonts for better performance -->
    <link rel="preload" href="assets/fonts/KorinnaNormal.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="assets/fonts/KorinnaBold.woff" as="font" type="font/woff" crossorigin>
    <link rel="preload" href="assets/fonts/KorinnaItalic.woff2" as="font" type="font/woff2" crossorigin>

    <!-- SEO related -->
    <meta name="description" content="JeoPARODY!?? A unique comedic trivia adventure.">
    <meta property="og:title" content="JeoPARODY!??">
    <meta property="og:description" content="A unique interactive comedic trivia adventure with AI integrated in new and novel ways.">
    <meta property="og:image" content="screenshots/jeopardish-screenshot-noQuestion.png">
    
    <!-- title -->
    <title>JeoPARODY!??</title>
    
    <!-- favicons -->
    <link rel="icon" href="/public/favicon.svg" type="image/svg+xml">
    <!-- <link rel="icon" href="images/favicon2.webp" type="image/webp"> -->
    <!-- <link rel="icon" href="favicon.ico" type="image/x-icon"> -->

    <!-- Font stylesheet -->
    <link rel="stylesheet" href="assets/fonts/stylesheet.css">
    
    <!-- Master CSS - Single source of truth -->
    <link rel="stylesheet" href="src/styles/master.css">
    <!-- Beautiful Plane Animation -->
    <link rel="stylesheet" href="src/styles/plane-animation.css">
        
    <!-- external JS -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <!-- Firebase scripts (must be first) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <!-- Your config (must be after Firebase scripts) -->
    <script src="dist/js/firebase-config.js"></script>

    <!-- Load the main module with Vite -->
    <script type="module" src="/src/main.js"></script>
    
    <!-- Compatibility bridge -->
    <script type="module" src="/src/compatibility-bridge.js"></script>
    
    <!-- Debug script -->
    <script src="assets/scripts/debug.js"></script>
    
    <!-- external CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <!-- Essential external fonts only -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    
</head>
<body lang="en">

    <!-- React-like app container for new component architecture -->
    <div id="app"></div>

    <!-- game container -->
    <div class="game-container">
        
        <!-- User Profile Section  -->
        <div class="user-profile">
            <!-- add profile icon -->
            <!-- <img src="_____" alt="Profile" class="profile-pic"> -->
            <h3>Alex</h3>
            <p>Score: $0</p>
            <p>Streak: 0</p>
        </div>

        <!-- Game header -->
        <header class="game-header">
            <div class="header-content">
                <!-- Left Controls: Language Toggle -->
                <div class="header-controls-left">
                    <div class="toggle-container">
                        <button id="lang-btn" class="header-icon-btn js-lang-toggle" data-lang="en" title="Switch Language">
                            <i class="fas fa-language"></i>
                            <span class="flag-emoji">🇺🇸</span>
                        </button>
                    </div>
                </div>

                <!-- Center: Logo -->
                <div class="logo-container">
                    <img src="assets/images/title/title-jeopardish!-pixelart.png" alt="jeoPARODY!" class="title-image">
                    <!-- Peeking scoreboard -->
                    <div id="scoreboard" class="scoreboard">
                        <h2>SCOREBOARD</h2>
                        <p>SCORE: <span id="score" class="score-value">0</span></p>
                        <p>STREAK: <span id="streak" class="score-value">0</span></p>
                        <p>TOP SCORE: <span id="top-score" class="score-value">0</span></p>
                        <p>MAX STREAK: <span id="max-streak" class="score-value">0</span></p>
                    </div>
                </div>

                <!-- Right Controls: Theme Switch & Hamburger -->
                <div class="header-controls-right">
                    <div class="toggle-container">
                        <label for="theme-switch" class="theme-switch">
                            <input type="checkbox" id="theme-switch">
                            <span class="slider"></span>
                        </label>
                        <div class="toggle-label">DARK MODE</div>
                    </div>
                    <button id="hamburger-menu" class="hamburger-button" aria-label="Open menu" aria-expanded="false">
                        <span class="hamburger-line"></span>
                        <span class="hamburger-line"></span>
                        <span class="hamburger-line"></span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Side navigation menu -->
        <nav id="side-menu" class="side-menu" aria-hidden="true">
            <ul class="menu-items">
                <li>
                    <button id="lang-menu-btn" class="js-lang-toggle" data-lang="en" title="Switch Language">
                        <i class="fas fa-language"></i>
                    </button>
                </li>
                <li>
                    <button id="settings-button" aria-label="Game settings">
                        <i class="fas fa-cog"></i>
                        <span>Settings</span>
                    </button>
                </li>
                <li>
                    <button id="stats-button" aria-label="View statistics">
                        <i class="fas fa-chart-bar"></i>
                        <span>Statistics</span>
                    </button>
                </li>
                <li>
                    <button id="achievements-button" aria-label="View achievements">
                        <i class="fas fa-trophy"></i>
                        <span>Achievements</span>
                    </button>
                </li>
            </ul>
            
            <!-- Auth buttons container -->
            <div class="auth-buttons-div">
                <button id="login-button" aria-label="Sign in to save scores">
                    <i class="fas fa-sign-in-alt"></i> sign in
                </button>
                <button id="leaderboard-button" aria-label="View leaderboard">
                    <i class="fas fa-crown"></i> leaderboard
                </button>
            </div>
        </nav>
        
        <!-- Navigation backdrop -->
        <div class="nav-backdrop"></div>

        <!-- Main content area -->
        <div class="main-content-wrapper">
            <main class="main-content">

            <!-- Speech bubble with category, value, question & answer display areas -->
            <div id="speechBubble" class="speechBubble" title="Click on left or right edge to change speech bubble style">
                <div id="categoryBox"></div>
                <div id="valueBox"></div>
                <div id="questionBox"></div>
                <div id="answerBox"></div>
            </div>
            
            <!-- Button container with icon buttons -->
            <div class="button-div">
                <button id="questionButton" aria-label="Get new question">
                    <i class="fas fa-sync-alt"></i>
                    <span class="button-tooltip">New Question</span>
                </button>
                <button id="answerButton" aria-label="Show/Hide answer">
                    <i class="fas fa-eye"></i>
                    <span class="button-tooltip">Show/HideAnswer</span>
                </button>
            </div>
            
            </main>
        </div>

        <!-- Sticky Footer with host and input -->
        <footer class="sticky-footer">

            <!-- Host container -->
            <div class="host-container">
                <img id="trebekImage" class="host-image" alt="AI Trebek" src="assets/images/trebek/trebek-good-01.png" title="Click left/right side to cycle hosts">
            </div>
            
            <!-- User input section -->
            <div class="input-section">
                <div class="input-div">
                    <div class="input-wrapper">
                        <input type="text" id="inputBox" placeholder="enter answer here...">
                        <div class="custom-cursor"></div>
                    </div>
                </div>
                <button id="checkButton" aria-label="Check your answer">
                    <i class="fas fa-check"></i>
                    <span class="button-tooltip">Check Answer</span>
                </button>
            </div>
        </footer>

        <!-- Beautiful Plane Animation Container -->
        <div class="plane-container">
            <div class="plane-unit" data-plane="1">
                <div class="beautiful-plane">
                    <div class="wing-main"></div>
                    <div class="wing-secondary"></div>
                    <div class="tail"></div>
                    <div class="stabilizer"></div>
                    <div class="propeller"></div>
                    <div class="propeller-hub"></div>
                    <div class="cockpit"></div>
                    <div class="pontoon"></div>
                    <div class="pontoon"></div>
                    <div class="ticker-banner">
                        <div class="ticker-content">Welcome to JeoPARODY!?? The trivia game that's almost as good as the real thing!</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- User profile section (hidden by default) -->
        <div id="user-profile" class="user-profile" style="display: none;">
            <img id="user-avatar" class="user-avatar">
            <span id="user-name"></span>
            <button id="profile-button">edit profile</button>
            <button id="logout-button">sign out</button>
        </div>

    </div>

        <!-- Palm tree decorations -->
        <div class="palm-tree left">
            <div class="palm-trunk"></div>
            <div class="palm-leaves">
                <div class="palm-leaf"></div>
                <div class="palm-leaf"></div>
                <div class="palm-leaf"></div>
                <div class="palm-leaf"></div>
                <div class="palm-leaf"></div>
                <div class="palm-leaf"></div>
            </div>
        </div>
        <div class="palm-tree right">
            <div class="palm-trunk"></div>
            <div class="palm-leaves">
                <div class="palm-leaf"></div>
                <div class="palm-leaf"></div>
                <div class="palm-leaf"></div>
                <div class="palm-leaf"></div>
                <div class="palm-leaf"></div>
                <div class="palm-leaf"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- All services now integrated into modular architecture -->
    <!-- Scripts loaded via src/main.js -->

</body>
</html>
